<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo 600 -->
      <stop offset="100%" stop-color="#7C3AED" /> <!-- Violet 600 -->
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" /> <!-- Emerald 500 -->
      <stop offset="100%" stop-color="#34D399" /> <!-- Emerald 400 -->
    </linearGradient>
  </defs>

  <!-- Background base -->
  <rect width="512" height="512" rx="120" fill="#F8FAFC" /> <!-- Slate 50 background -->

  <!-- Modern Abstract Cloud Outline -->
  <path 
    d="M 160 380 
       C 110 380 80 340 80 290 
       C 80 240 120 200 170 200 
       C 190 140 250 100 320 120 
       C 370 135 400 180 400 230 
       C 435 240 450 270 450 310 
       C 450 350 420 380 380 380 
       Z" 
    fill="none" 
    stroke="url(#primary-grad)" 
    stroke-width="32" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />

  <!-- Upward Trend / Bid Increment Element -->
  <g transform="translate(180, 280)">
    <!-- Chart Bars representing increasing bids -->
    <rect x="0" y="20" width="24" height="40" rx="12" fill="url(#primary-grad)" opacity="0.4" />
    <rect x="40" y="-10" width="24" height="70" rx="12" fill="url(#primary-grad)" opacity="0.7" />
    <rect x="80" y="-50" width="24" height="110" rx="12" fill="url(#primary-grad)" />
    
    <!-- Ascending Arrow for 'Winning Bid' -->
    <path 
      d="M -20 30 L 120 -60" 
      stroke="url(#accent-grad)" 
      stroke-width="16" 
      stroke-linecap="round"
    />
    <path 
      d="M 90 -60 L 120 -60 L 120 -30" 
      fill="none"
      stroke="url(#accent-grad)" 
      stroke-width="16" 
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>